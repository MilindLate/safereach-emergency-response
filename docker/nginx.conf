# SafeReach — Nginx Reverse Proxy Configuration
# Production: terminates SSL, proxies FastAPI + Next.js + Socket.io

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=60r/m;
    limit_req_zone $binary_remote_addr zone=sos_limit:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m  rate=5r/m;

    # ── Upstream servers ──────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream dashboard {
        server dashboard:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.safereach.in safereach.in;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS — API backend ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.safereach.in;

        ssl_certificate     /etc/nginx/ssl/safereach.crt;
        ssl_certificate_key /etc/nginx/ssl/safereach.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 20M;  # Allow crash photo uploads

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── SOS endpoint (highest rate limit protection) ──────────────────────
        location /api/v1/sos/ {
            limit_req zone=sos_limit burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Photo upload ──────────────────────────────────────────────────────
        location /api/v1/sos/photo/ {
            limit_req zone=upload_limit burst=5 nodelay;
            proxy_pass          http://backend;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  60s;
            client_max_body_size 20M;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Socket.io (WebSocket) ─────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  3600s;  # Long-lived WS connections
            proxy_send_timeout  3600s;
        }

        # ── OpenAPI docs (dev only — block in strict prod) ────────────────────
        location /api/docs {
            proxy_pass http://backend/api/docs;
            # Uncomment to restrict to internal network only:
            # allow 10.0.0.0/8;
            # deny all;
        }
    }

    # ── HTTPS — Dispatcher Dashboard ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name safereach.in www.safereach.in;

        ssl_certificate     /etc/nginx/ssl/safereach.crt;
        ssl_certificate_key /etc/nginx/ssl/safereach.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Next.js dashboard
        location / {
            proxy_pass         http://dashboard;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Next.js HMR WebSocket (development only)
        location /_next/webpack-hmr {
            proxy_pass         http://dashboard/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Static Next.js assets — cache aggressively
        location /_next/static/ {
            proxy_pass         http://dashboard/_next/static/;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
